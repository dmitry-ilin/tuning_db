name: tsdb-tuner-stand
services:
  timescaledb:
    image: timescale/timescaledb:latest-pg17
    container_name: timescaledb
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${TARGET_DB_NAME}
      POSTGRES_USER: ${TARGET_DB_USER}
      POSTGRES_PASSWORD: ${TARGET_DB_PASSWORD}
      PGDATA: ${TARGET_POSTGRES_DATA_DIR}
    volumes:
      - ./config/postgresql.conf:/etc/postgresql/postgresql.conf
      # - ./config/postgresql.conf:/var/lib/postgresql/data/postgresql.conf
      # - ./config/postgresql.conf:/var/lib/postgresql/data/pgdata/postgresql.conf
      - ./init:/docker-entrypoint-initdb.d
      - tsdb_data:/var/lib/postgresql/data
      - ./tsbs_data:/tsbs_data
    ports:
      - "5433:5432"
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TARGET_DB_USER} -d ${TARGET_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - tsdb-net
    deploy:
      resources:
        limits:
          cpus: '0.5'  
          memory: '1400M' 
    command:
    - "postgres"
    - "-c"
    - "config_file=/etc/postgresql/postgresql.conf"

  benchmark_db:
    image: postgres:17
    container_name: benchmark_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${BENCH_NAME}
      POSTGRES_USER: ${BENCH_USER}
      POSTGRES_PASSWORD: ${BENCH_PASSWORD}
    volumes:
      - benchmark_data:/var/lib/postgresql/data
      - ./tsbs_data:/tsbs_data
      - ./sql/001_extend_results_schema.sql:/docker-entrypoint-initdb.d/001_extend_results_schema.sql:ro
    ports:
      - "5434:5432"
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${BENCH_USER} -d ${BENCH_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - tsdb-net
    deploy:
      resources:
        limits:
          cpus: '0.5'  
          memory: '64M' 

  tsbs-runner:
    build:
      context: .
      dockerfile: docker/tsbs-runner/Dockerfile
    container_name: tsbs-runner
    restart: unless-stopped
    env_file:
      - .env
    environment:
      TARGET_DB_DSN: ${TARGET_DB_DSN}
      RESULTS_DB_DSN: ${RESULTS_DB_DSN}
      TARGET_DB_HOST: ${TARGET_DB_HOST}
      TARGET_DB_PORT: ${TARGET_DB_PORT}
      TARGET_DB_USER: ${TARGET_DB_USER}
      TARGET_DB_PASSWORD: ${TARGET_DB_PASSWORD}
      TARGET_DB_NAME: ${TARGET_DB_NAME}
      TARGET_CONTAINER_NAME: ${TARGET_CONTAINER_NAME}
      MONITOR_CONTAINERS: "${MONITOR_CONTAINERS}"
    ports:
      - "8081:8080"
    volumes:
      - ./tsbs_data:/app/runtime
      - /var/run/docker.sock:/var/run/docker.sock
      - ./config/postgresql.conf:/app/config/postgresql.conf
      - ./config/config.yml:/app/config/config.yml:ro
      - ./config/param_space.yml:/app/config/param_space.yml:ro
    networks:
      - tsdb-net
    group_add:
      - "${DOCKER_GID}"
    deploy:
      resources:
        limits:
          cpus: '2.5'  
          memory: '128M' 
      

  tuner-service:
    build:
      context: .
      dockerfile: docker/tuner/Dockerfile
    container_name: tuner-service
    env_file:
      - .env
    environment:
      TUNER_CONFIG: ${TUNER_CONFIG}
      TARGET_DB_DSN: ${TARGET_DB_DSN}
      RESULTS_DB_DSN: ${RESULTS_DB_DSN}
      BENCHMARK_WORKER_URL: ${BENCHMARK_WORKER_URL:-http://tsbs-runner:8080}
    volumes:
      - ./tsbs_data:/app/runtime
      - ./config/postgresql.conf:/app/config/postgresql.conf
      - ./config/tuner.yml:/app/config/tuner.yml:ro
      - ./config/param_space.yml:/app/config/param_space.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - tsdb-net
    group_add:
      - "${DOCKER_GID}"
    stdin_open: true
    tty: true
    command: ["tail", "-f", "/dev/null"]
    deploy:
      resources:
        limits:
          cpus: '0.5'  
          memory: '128M' 

  monitoring:
    build:
      context: .
      dockerfile: docker/monitoring/Dockerfile
    container_name: monitoring
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD}
    ports:
      - "3002:3000"
      - "4317:4317"
      - "4318:4318"
      - "9092:9090"
    volumes:
      - lgtm_data:/data
    networks:
      - tsdb-net
    deploy:
      resources:
        limits:
          cpus: '0.5'  
          memory: '512M' 

  tuner-exporter:
    build:
      context: .
      dockerfile: docker/tuner/Dockerfile
    container_name: tuner-exporter
    command: ["python", "-m", "tsdb_tuner.exporter", "--port", "9091", "--interval", "15"]
    environment:
      RESULTS_DB_DSN: "${RESULTS_DB_DSN}"
    ports:
      - "9091:9091"
    restart: unless-stopped
    networks:
      - tsdb-net
    volumes:
    - ./tsbs_data:/app/runtime:ro
    deploy:
      resources:
        limits:
          cpus: '0.1'  
          memory: '64M' 


networks:
  tsdb-net:
    driver: bridge


volumes:
  tsdb_data:
    external: true
    name: tuning_db-main_tsdb_data
  tsbs_data:
  lgtm_data:
  benchmark_data:
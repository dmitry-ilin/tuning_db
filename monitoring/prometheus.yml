global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Сам Prometheus
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Метрики оптимизатора TimescaleDB (наш exporter)
  - job_name: "tsdb-tuner"
    static_configs:
      - targets: ["tuner-exporter:9091"]
    metrics_path: /metrics
    scrape_interval: 15s

  # Node exporter (если запущен) — метрики хоста
  - job_name: "node"
    static_configs:
      - targets: ["node-exporter:9100"]

  # postgres_exporter — метрики самого TimescaleDB в реальном времени
  - job_name: "postgres"
    static_configs:
      - targets: ["postgres-exporter:9187"]
